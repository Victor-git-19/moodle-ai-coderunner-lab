name: moodle-ai-coderunner-lab

services:
  # MariaDB хранит пользователей, курсы, вопросы и попытки Moodle.
  db:
    image: mariadb:11.4.12
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Официальный sandbox выполняет код; AI service код не запускает.
  jobe:
    build:
      context: https://github.com/trampgeek/jobeinabox.git#7727d8f071dda3a0a54e95328646a5c9cc95423f
      args:
        JOBE_VERSION: v2.2.2
        TZ: ${TZ}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/bin/python3", "/var/www/html/jobe/minimaltest.py"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Moodle — единственный сервис, опубликованный наружу.
  moodle:
    build:
      context: .
      dockerfile: moodle/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      jobe:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MOODLE_URL: ${MOODLE_URL}
      MOODLE_SITE_NAME: ${MOODLE_SITE_NAME}
      MOODLE_ADMIN_USER: ${MOODLE_ADMIN_USER}
      MOODLE_ADMIN_PASSWORD: ${MOODLE_ADMIN_PASSWORD}
      MOODLE_ADMIN_EMAIL: ${MOODLE_ADMIN_EMAIL}
      AI_SERVICE_URL: http://ai-service:8000/api/v1/analyze
      AI_TIMEOUT: ${AI_TIMEOUT}
      TZ: ${TZ}
    ports:
      - "${MOODLE_PORT}:80"
    volumes:
      - moodledata:/var/www/moodledata
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  # Ollama доступна только другим контейнерам проекта.
  ollama:
    image: ollama/ollama:0.30.11
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 10m
      TZ: ${TZ}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # Одноразовый bootstrap скачивает модель только при её отсутствии.
  ollama-model:
    image: ollama/ollama:0.30.11
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama show "$${OLLAMA_MODEL}" >/dev/null 2>&1 || ollama pull "$${OLLAMA_MODEL}"
    restart: "no"

  # FastAPI объединяет безопасный AST-анализ и ответ локальной модели.
  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      AI_TIMEOUT: ${AI_TIMEOUT}
      AI_MAX_CODE_SIZE: ${AI_MAX_CODE_SIZE}
      TZ: ${TZ}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  # Именованные volumes сохраняют данные после обычного docker compose down.
  db_data:
  moodledata:
  ollama_data:

networks:
  default:
    ipam:
      config:
        # Отдельная тестовая подсеть уменьшает риск пересечения с локальной сетью сервера.
        - subnet: 198.18.0.0/24
